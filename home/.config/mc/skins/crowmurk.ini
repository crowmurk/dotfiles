# crowmurk
# Based on yadt256-defbg (Yet Another Dark Theme, 256 colors, default background)
# Based on modarin256-defbg of Oliver Lange <modarin@bloody.in-berlin.de>
#
# The skin looks good only if you have some sort of a "dark background".
# It can be set by the color schema of your terminal (e.g. Green-On-Black)
# or as underlying windows in the transparent mode. For a "light background",
# I'd use a version of the skin with a static background color (yadt256)

[skin]
    description = Yet Another Dark Theme, 256 colors, default background
    256colors = true

[Lines]
    horiz = ─
    vert = │
    lefttop = ┌
    righttop = ┐
    leftbottom = └
    rightbottom = ┘
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ─
    dvert = │
    dlefttop = ┌
    drighttop = ┐
    dleftbottom = └
    drightbottom = ┘
    dtopmiddle = ┬
    dbottommiddle = ┴
    dleftmiddle = ├
    drightmiddle = ┤

[core]
    _default_ = color245;default
    selected = color179;color239
    marked = color144;color235
    markselect = color179;color239
    gauge = color245;color66
    input = color252;color239
    inputmark = color228;default
    inputunchanged = color252;color239
    commandlinemark = color228;default;
    reverse = color179;default;
    header = color179;;
    disabled = color245;color235
    #inputhistory =
    #commandhistory =

[dialog]
    _default_ = color252;color235
    dhotnormal = color214
    dfocus = color179;color239
    dhotfocus = color214;color239
    dtitle = color179;;bold

[error]
    _default_ = color252;color235
    errdhotnormal = color214
    errdfocus = color179;color239
    errdhotfocus = color214;color239
    errdtitle = color179;;bold

[filehighlight]
    directory = color144;;bold
    executable = color114
    symlink = color45
    hardlink =
    stalelink = color203
    device = color170
    special = color142
    core = color197
    temp = color245
    archive = color172
    doc = color153
    source = color109
    media = color141
    graph = color216
    database = color103

[menu]
    _default_ = color252;color235
    menusel = color179;color239
    menuhot = color214
    menuhotsel = color214;color239
    menuinactive = color245

[popupmenu]
    _default_ = color245;default
    menusel = color179;color239
    menutitle = color179;;bold

[buttonbar]
    button = color245;color235
    hotkey = color214;color235;bold

[statusbar]
    _default_ = color252;color66

[help]
    _default_ = color252;color235
    helpitalic = color114;;bold
    helpbold = color179;;bold
    helplink = color66
    helpslink = color66;color239;bold
    helptitle = color179;;bold

[editor]
    _default_ = color245;default
    editbold = color179;;bold
    editmarked = black;color252
    editwhitespace = color56;color239
    editlinestate = color66;color235
    bookmark = ;color239
    bookmarkfound = ;color239;bold
    editrightmargin = ;color235;bold

[viewer]
    _default_ = color245;default
    viewbold = ;;bold
    viewunderline = ;;underline
    viewselected = black;color252

[diffviewer]
    changedline = color231;color29
    changednew = color232;color78
    changed = color231;color39
    added = color232;color81
    removed = ;color234
    error = color231;color160

[widget-common]
    sort-sign-up = ↑
    sort-sign-down = ↓

[widget-panel]
    hiddenfiles-sign-show = •
    hiddenfiles-sign-hide = ○
    history-prev-item-sign = <
    history-next-item-sign = >
    history-show-list-sign = ^

[widget-scollbar]
    first-vert-char = ↑
    last-vert-char = ↓
    first-horiz-char = <
    last-horiz-char = >
    current-char = ■
    background-char = ▒
